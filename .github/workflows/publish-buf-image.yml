name: Publish Buf Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'infra/buf/buf.Dockerfile' # Chỉ kích hoạt build lại khi thay đổi Dockerfile này

env:
  REGISTRY: ghcr.io
  # GitHub Container Registry yêu cầu tên image viết thường hoàn toàn
  IMAGE_NAME: buf-generator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Yêu cầu quyền ghi gói để đẩy lên GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Token tự sinh bởi GitHub Actions

      - name: Convert repository name to lowercase
        id: prep
        run: |
          # Chuyển đổi tên owner/repo về chữ thường để làm tag Docker hợp lệ
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_path=${{ env.REGISTRY }}/${REPO_LOWER}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/buf/buf.Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_path }}:latest
            ${{ steps.prep.outputs.image_path }}:1.0.0
