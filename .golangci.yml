run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: '1.25'

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - gocritic
    - errorlint
    - errname
    - forcetypeassert
    - gochecknoglobals
    - gochecknoinits
    - forbidigo
    - musttag
    - perfsprint
    - prealloc
    - lll
    - decorder
    - revive
    - goprintffuncname
    - paralleltest
    - gci
    - gofmt

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment # Tắt cảnh báo sắp xếp trường struct để tránh tối ưu hoá mù quáng
  lll:
    line-length: 99 # Giới hạn 99 ký tự theo Rule 38
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  forbidigo:
    forbid:
      - '^os\.Exit$#Chỉ cho phép os.Exit trong main() của package main'
      - '^log\.Fatal$#Chỉ cho phép log.Fatal trong main() của package main'
      - '^log\.Fatalf$#Chỉ cho phép log.Fatalf trong main() của package main'

issues:
  # Loại trừ hoàn toàn các thư mục chứa code tự sinh khỏi phạm vi phân tích
  exclude-dirs:
    - internal/gen
    - docs/swagger

