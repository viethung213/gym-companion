version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: '1.25'

linters:
  default: none
  enable:
    - govet
    - errcheck
    - gocritic
    - errorlint
    - errname
    - forcetypeassert
    - gochecknoglobals
    - gochecknoinits
    - forbidigo
    - musttag
    - perfsprint
    - prealloc
    - lll
    - decorder
    - revive
    - goprintffuncname
    - paralleltest
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # Tắt cảnh báo sắp xếp trường struct để tránh tối ưu hoá mù quáng
    lll:
      line-length: 99 # Giới hạn 99 ký tự theo Rule 38
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    forbidigo:
      forbid:
        - pattern: '^os\.Exit$'
          msg: 'Chỉ cho phép os.Exit trong main() của package main'
        - pattern: '^log\.Fatal$'
          msg: 'Chỉ cho phép log.Fatal trong main() của package main'
        - pattern: '^log\.Fatalf$'
          msg: 'Chỉ cho phép log.Fatalf trong main() của package main'

formatters:
  enable:
    - gofmt
    - gci
