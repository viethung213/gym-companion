version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: fitai-redis-test
    ports:
      - "6379:6379"
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fitai-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fitai-redis-commander-test
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8083:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fitai-network

networks:
  fitai-network:
    name: fitai-network
    external: true

volumes:
  redis-test-data:
