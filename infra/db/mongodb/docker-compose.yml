version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fitai-mongodb-test
    ports:
      - "27017:27017"
    volumes:
      - mongo-test-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ping:1})' | mongosh localhost:27017/test --quiet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fitai-network

  mongo-express:
    image: mongo-express:1.0.0-alpha.4
    container_name: fitai-mongo-express-test
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fitai-network

networks:
  fitai-network:
    name: fitai-network
    external: true

volumes:
  mongo-test-data:
