version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitai-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitai
    ports:
      - "5432:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ../../../scripts/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fitai-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: fitai-pgadmin-test
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fitai.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitai-network

networks:
  fitai-network:
    name: fitai-network
    external: true

volumes:
  postgres-test-data:
