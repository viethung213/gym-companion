syntax = "proto3";

package contracts.supporting.workout_log.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/workout_log/v1/service;workoutlogv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/supporting/workout_log/v1/message/workout_log_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Workout Logging & Tracking API"
    version: "1.0"
    description: "API ghi chép lịch sử tập luyện và đo lường tiến trình 1RM."
  }
};

service WorkoutLogService {
  // Lấy lịch sử các set tập gần đây
  rpc GetWorkoutHistory (contracts.supporting.workout_log.v1.message.GetWorkoutHistoryRequest) returns (contracts.supporting.workout_log.v1.message.GetWorkoutHistoryResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/{userId}/logs"
    };
  }
}
