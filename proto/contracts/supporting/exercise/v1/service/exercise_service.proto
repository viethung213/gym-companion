syntax = "proto3";

package contracts.supporting.exercise.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/exercise/v1/service;exercisev1service";

import "google/api/annotations.proto";
import "contracts/supporting/exercise/v1/message/exercise_messages.proto";

service ExerciseService {
  // Tìm kiếm bài tập trong thư viện (User & Coach)
  rpc SearchExercises (contracts.supporting.exercise.v1.message.SearchExercisesRequest) returns (contracts.supporting.exercise.v1.message.SearchExercisesResponse) {
    option (google.api.http) = {
      get: "/api/v1/exercises/search"
    };
  }

  // Lấy toàn bộ danh mục metadata (BodyParts, Equipments, Muscles, Tags)
  rpc GetCatalogMetadata (contracts.supporting.exercise.v1.message.GetCatalogMetadataRequest) returns (contracts.supporting.exercise.v1.message.GetCatalogMetadataResponse) {
    option (google.api.http) = {
      get: "/api/v1/exercises/metadata"
    };
  }

  // Lấy chi tiết một bài tập
  rpc GetExercise (contracts.supporting.exercise.v1.message.GetExerciseRequest) returns (contracts.supporting.exercise.v1.message.GetExerciseResponse) {
    option (google.api.http) = {
      get: "/api/v1/exercises/{id}"
    };
  }

  // API dành cho Admin CRUD
  rpc CreateExercise (contracts.supporting.exercise.v1.message.CreateExerciseRequest) returns (contracts.supporting.exercise.v1.message.CreateExerciseResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/exercises"
      body: "*"
    };
  }

  rpc UpdateExercise (contracts.supporting.exercise.v1.message.UpdateExerciseRequest) returns (contracts.supporting.exercise.v1.message.UpdateExerciseResponse) {
    option (google.api.http) = {
      put: "/api/v1/admin/exercises/{id}"
      body: "*"
    };
  }

  rpc DeleteExercise (contracts.supporting.exercise.v1.message.DeleteExerciseRequest) returns (contracts.supporting.exercise.v1.message.DeleteExerciseResponse) {
    option (google.api.http) = {
      delete: "/api/v1/admin/exercises/{id}"
    };
  }
}
