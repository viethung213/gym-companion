syntax = "proto3";

package contracts.supporting.exercise.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/exercise/v1/message;exercisev1message";

enum ExerciseStatus {
  EXERCISE_STATUS_UNSPECIFIED = 0;
  EXERCISE_STATUS_DRAFT = 1;
  EXERCISE_STATUS_PENDING_APPROVAL = 2;
  EXERCISE_STATUS_ACTIVE = 3;
  EXERCISE_STATUS_ARCHIVED = 4;
}

message ExerciseInfo {
  string id = 1;
  string name = 2;
  string body_part_id = 3;
  string equipment_id = 4;
  string target_muscle_id = 5;
  string instructions = 6;
  repeated string secondary_muscle_ids = 7;
  string thumbnail_url = 8;
  string media_url = 9;
  string video_url = 10;
  string difficulty = 11;
  int32 default_rest_seconds = 12;
  repeated string tag_ids = 13;
  ExerciseStatus status = 14;
}

message CreateExerciseRequest {
  string name = 1;
  string body_part_id = 2;
  string equipment_id = 3;
  string target_muscle_id = 4;
  string instructions = 5;
  repeated string secondary_muscle_ids = 6;
  string thumbnail_url = 7;
  string media_url = 8;
  string video_url = 9;
  string difficulty = 10;
  int32 default_rest_seconds = 11;
  repeated string tag_ids = 12;
}

message CreateExerciseResponse {
  ExerciseInfo exercise = 1;
}

message UpdateExerciseRequest {
  string id = 1;
  string name = 2;
  string body_part_id = 3;
  string equipment_id = 4;
  string target_muscle_id = 5;
  string instructions = 6;
  repeated string secondary_muscle_ids = 7;
  string thumbnail_url = 8;
  string media_url = 9;
  string video_url = 10;
  string difficulty = 11;
  int32 default_rest_seconds = 12;
  repeated string tag_ids = 13;
  ExerciseStatus status = 14 [deprecated = true];
}

message UpdateExerciseResponse {
  ExerciseInfo exercise = 1;
}

message DeleteExerciseRequest {
  string id = 1;
}

message DeleteExerciseResponse {
  bool success = 1;
}

message SubmitExerciseForApprovalRequest {
  string id = 1;
}

message SubmitExerciseForApprovalResponse {
  ExerciseInfo exercise = 1;
}

message ApproveExerciseRequest {
  string id = 1;
}

message ApproveExerciseResponse {
  ExerciseInfo exercise = 1;
}

message GetExerciseRequest {
  string id = 1;
}

message GetExerciseResponse {
  ExerciseInfo exercise = 1;
}

message SearchExercisesRequest {
  string body_part_id = 1;
  string equipment_id = 2;
  repeated string avoid_injury_areas = 3;
  repeated string tag_ids = 4;
  string target_muscle_id = 5;
  repeated string secondary_muscle_ids = 6;
  string keyword = 7;
  string difficulty = 8;
  int32 limit = 9;
  int32 offset = 10;
}

message SearchExercisesResponse {
  repeated ExerciseInfo exercises = 1;
}

// Lookup metadata definitions
message BodyPart {
  string id = 1;
  string name = 2;
}

message Equipment {
  string id = 1;
  string name = 2;
}

message Muscle {
  string id = 1;
  string name = 2;
  string body_part_id = 3;
}

message Tag {
  string id = 1;
  string name = 2;
}

message GetCatalogMetadataRequest {}

message GetCatalogMetadataResponse {
  repeated BodyPart body_parts = 1;
  repeated Equipment equipments = 2;
  repeated Muscle muscles = 3;
  repeated Tag tags = 4;
}
