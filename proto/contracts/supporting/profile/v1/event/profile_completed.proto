syntax = "proto3";

package contracts.supporting.profile.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/profile/v1/event;profilev1event";

message BiologicalMetrics {
  float weight_kg = 1;
  float height_cm = 2;
  int32 age = 3;
  string gender = 4;
}

message ProfileCompleted {
  string user_id = 1;
  BiologicalMetrics biological_metrics = 2;
  repeated string goals = 3;
  repeated string registered_injuries = 4;
  repeated string preferred_workout_times = 5;
  string experience_level = 6;
}
