syntax = "proto3";

package contracts.supporting.profile.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/profile/v1/event;profilev1event";

import "contracts/supporting/profile/v1/message/profile_messages.proto";

message BiologicalMetrics {
  float weight_kg = 1;
  float height_cm = 2;
  int32 age = 3;
  string gender = 4;
}

message ProfileCompleted {
  string user_id = 1;
  BiologicalMetrics biological_metrics = 2;
  string primary_goal = 3;
  repeated string secondary_goals = 4;
  repeated contracts.supporting.profile.v1.message.Injury injuries = 5;
  repeated contracts.supporting.profile.v1.message.AvailabilitySlot availability_slots = 6; // Khung giờ rảnh 
  string experience_level = 7;
  repeated string preferred_muscle_groups = 8; 
  repeated string available_equipment = 9; 
  string completed_at = 10;
}
