syntax = "proto3";

package contracts.supporting.profile.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/profile/v1/message;profilev1message";

message InjuryInput {
  string muscle_group = 1;
  string severity = 2; // "MILD", "MODERATE", "SEVERE"
  string notes = 3;
}

message Injury {
  string injury_id = 1;
  string muscle_group = 2;
  string severity = 3;
  string notes = 4;
  string reported_at = 5;
  bool is_recovered = 6;
  string recovered_at = 7;
}

message SaveHealthProfileRequest {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  repeated string goals = 6;
  repeated InjuryInput injuries = 7;
  string experience_level = 8; // "BEGINNER", "INTERMEDIATE", "ADVANCED"
  repeated string preferred_workout_times = 9;
}

message SaveHealthProfileResponse {
  string user_id = 1;
  float completion_rate = 2;
  bool ai_coach_activated = 3;
  string message = 4;
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  repeated string goals = 6;
  string experience_level = 7;
  repeated string preferred_workout_times = 8;
  repeated Injury injuries = 9;
  string created_at = 10;
  string updated_at = 11;
}

message UpdateProfileRequest {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  repeated string goals = 6;
  string experience_level = 7;
  repeated string preferred_workout_times = 8;
}

message UpdateProfileResponse {
  bool success = 1;
  string message = 2;
}

message LogPeriodicMetricsRequest {
  string user_id = 1;
  float weight_kg = 2;
  float body_fat_percent = 3;
  string progress_photo_url = 4;
}

message LogPeriodicMetricsResponse {
  string log_id = 1;
  string user_id = 2;
  float weight_kg = 3;
  float body_fat_percent = 4;
  string sync_status = 5;
  string message = 6;
}

message ReportInjuryRequest {
  string user_id = 1;
  string muscle_group = 2;
  string severity = 3;
  string notes = 4;
}

message ReportInjuryResponse {
  string injury_id = 1;
  bool success = 2;
  string message = 3;
}

message RecoverInjuryRequest {
  string user_id = 1;
  string injury_id = 2;
}

message RecoverInjuryResponse {
  bool success = 1;
  string message = 2;
}
