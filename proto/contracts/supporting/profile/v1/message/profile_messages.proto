syntax = "proto3";

package contracts.supporting.profile.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/profile/v1/message;profilev1message";

message InjuryInput {
  string muscle_group = 1;
  string severity = 2; // "MILD", "MODERATE", "SEVERE"
  string notes = 3;
}

message Injury {
  string injury_id = 1;
  string muscle_group = 2;
  string severity = 3;
  string notes = 4;
  string reported_at = 5;
  bool is_recovered = 6;
  string recovered_at = 7;
}

// AvailabilitySlot mô tả 1 ngày trong tuần user rảnh để tập (BR-AC-09)
message AvailabilitySlot {
  string day_of_week = 1; // "MONDAY".."SUNDAY"
  string time_window = 2; // "MORNING" | "AFTERNOON" | "EVENING", hoặc "HH:MM-HH:MM"
  int32 max_duration_minutes = 3;
}

message SaveHealthProfileRequest {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  string primary_goal = 6; // "MUSCLE_GAIN" | "FAT_LOSS" (BR-AC-14)
  repeated string secondary_goals = 7;
  repeated InjuryInput injuries = 8;
  string experience_level = 9; // "BEGINNER", "INTERMEDIATE", "ADVANCED"
  repeated AvailabilitySlot availability_slots = 10;
  repeated string preferred_muscle_groups = 11; // tối đa 2, optional (FR-UM-05, BR-AC-10)
  repeated string available_equipment = 12; // Dụng cụ sẵn có, rỗng = bodyweight (FR-UM-06, BR-AC-13)
}

message SaveHealthProfileResponse {
  string user_id = 1;
  float completion_rate = 2;
  bool ai_coach_activated = 3;
  string message = 4;
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  string primary_goal = 6;
  repeated string secondary_goals = 7;
  string experience_level = 8;
  repeated AvailabilitySlot availability_slots = 9;
  repeated string preferred_muscle_groups = 10;
  repeated string available_equipment = 11;
  repeated Injury injuries = 12;
  string created_at = 13;
  string updated_at = 14;
}

message UpdateProfileRequest {
  string user_id = 1;
  float weight_kg = 2;
  float height_cm = 3;
  int32 age = 4;
  string gender = 5;
  string primary_goal = 6;
  repeated string secondary_goals = 7;
  string experience_level = 8;
  repeated AvailabilitySlot availability_slots = 9;
  repeated string preferred_muscle_groups = 10;
  repeated string available_equipment = 11;
}

message UpdateProfileResponse {
  bool success = 1;
  string message = 2;
}

message LogPeriodicMetricsRequest {
  string user_id = 1;
  float weight_kg = 2;
  float body_fat_percent = 3;
  string progress_photo_url = 4;
}

message LogPeriodicMetricsResponse {
  string log_id = 1;
  string user_id = 2;
  float weight_kg = 3;
  float body_fat_percent = 4;
  string sync_status = 5;
  string message = 6;
}

message ReportInjuryRequest {
  string user_id = 1;
  string muscle_group = 2;
  string severity = 3;
  string notes = 4;
}

message ReportInjuryResponse {
  string injury_id = 1;
  bool success = 2;
  string message = 3;
}

message RecoverInjuryRequest {
  string user_id = 1;
  string injury_id = 2;
}

message RecoverInjuryResponse {
  bool success = 1;
  string message = 2;
}
