syntax = "proto3";

package contracts.supporting.catalog.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/supporting/catalog/v1/service;catalogv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/supporting/catalog/v1/message/catalog_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Catalog Reference Library API"
    version: "1.0"
    description: "API quản lý danh mục bài tập chuẩn và thực phẩm chuẩn trong hệ thống."
  }
};

service CatalogService {
  // --- EXERCISE ENDPOINTS ---

  // Tạo một bài tập mới (Trạng thái Draft)
  rpc CreateExercise (contracts.supporting.catalog.v1.message.CreateExerciseRequest) returns (contracts.supporting.catalog.v1.message.CreateExerciseResponse) {
    option (google.api.http) = {
      post: "/api/v1/catalog/exercises"
      body: "*"
    };
  }

  // Duyệt bài tập (Chuyển sang Active)
  rpc ApproveExercise (contracts.supporting.catalog.v1.message.ApproveExerciseRequest) returns (contracts.supporting.catalog.v1.message.ApproveExerciseResponse) {
    option (google.api.http) = {
      post: "/api/v1/catalog/exercises/{exercise_id}/approve"
      body: "*"
    };
  }

  // Lấy chi tiết bài tập theo ID
  rpc GetExercise (contracts.supporting.catalog.v1.message.GetExerciseRequest) returns (contracts.supporting.catalog.v1.message.GetExerciseResponse) {
    option (google.api.http) = {
      get: "/api/v1/catalog/exercises/{exercise_id}"
    };
  }

  // Lấy danh sách các bài tập
  rpc ListExercises (contracts.supporting.catalog.v1.message.ListExercisesRequest) returns (contracts.supporting.catalog.v1.message.ListExercisesResponse) {
    option (google.api.http) = {
      get: "/api/v1/catalog/exercises"
    };
  }

  // --- FOOD ENDPOINTS ---

  // Tạo một thực phẩm mới (Trạng thái Draft)
  rpc CreateFoodItem (contracts.supporting.catalog.v1.message.CreateFoodItemRequest) returns (contracts.supporting.catalog.v1.message.CreateFoodItemResponse) {
    option (google.api.http) = {
      post: "/api/v1/catalog/foods"
      body: "*"
    };
  }

  // Duyệt thực phẩm (Chuyển sang Active)
  rpc ApproveFoodItem (contracts.supporting.catalog.v1.message.ApproveFoodItemRequest) returns (contracts.supporting.catalog.v1.message.ApproveFoodItemResponse) {
    option (google.api.http) = {
      post: "/api/v1/catalog/foods/{food_id}/approve"
      body: "*"
    };
  }

  // Lấy chi tiết thực phẩm theo ID
  rpc GetFoodItem (contracts.supporting.catalog.v1.message.GetFoodItemRequest) returns (contracts.supporting.catalog.v1.message.GetFoodItemResponse) {
    option (google.api.http) = {
      get: "/api/v1/catalog/foods/{food_id}"
    };
  }

  // Lấy danh sách các thực phẩm
  rpc ListFoodItems (contracts.supporting.catalog.v1.message.ListFoodItemsRequest) returns (contracts.supporting.catalog.v1.message.ListFoodItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/catalog/foods"
    };
  }
}
