syntax = "proto3";

package contracts.generic.audio.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/audio/v1/event;audiov1event";

// Sự kiện được phát đi khi nhạc nền bị giảm âm lượng để ưu tiên giọng nói AI
message AudioDucked {
  string eventId = 1;
  string eventType = 2;
  string timestamp = 3;
  
  string sessionId = 4;
  float duckedVolumePercent = 5;
  string reason = 6;
}
