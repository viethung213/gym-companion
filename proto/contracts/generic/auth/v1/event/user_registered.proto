syntax = "proto3";

package contracts.generic.auth.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/event;authv1event";

message UserRegistered {
  string user_id = 1;
  string email = 2;
  string full_name = 3;
  string phone = 4;
  string registered_at = 5;
}
