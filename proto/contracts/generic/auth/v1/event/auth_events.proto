syntax = "proto3";

package contracts.generic.auth.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/event;authv1event";

// Sự kiện được phát đi khi người dùng đăng ký tài khoản thành công
message UserRegistered {
  string eventId = 1;
  string eventType = 2;
  string timestamp = 3;
  
  message UserDetails {
    string userId = 1;
    string email = 2;
    string phone = 3;
    string registeredAt = 4;
  }
  UserDetails data = 4;
}

// Sự kiện được phát đi khi người dùng đăng nhập
message UserLoggedIn {
  string eventId = 1;
  string eventType = 2;
  string timestamp = 3;
  
  string userId = 4;
  string loginIp = 5;
  string loggedInAt = 6;
}
