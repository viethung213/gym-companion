syntax = "proto3";

package contracts.generic.auth.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/service;authv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/generic/auth/v1/message/auth_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Identity & Authentication API"
    version: "1.0"
    description: "API xác thực người dùng, đăng ký, đăng nhập và xử lý OTP."
  }
};

service AuthService {
  // Xác thực token và lấy thông tin phiên làm việc
  rpc ValidateToken (contracts.generic.auth.v1.message.ValidateTokenRequest) returns (contracts.generic.auth.v1.message.ValidateTokenResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/validate"
      body: "*"
    };
  }

  // Đăng nhập người dùng bằng email
  rpc Login (contracts.generic.auth.v1.message.LoginRequest) returns (contracts.generic.auth.v1.message.LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }
}
