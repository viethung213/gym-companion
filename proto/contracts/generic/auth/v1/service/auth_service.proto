syntax = "proto3";

package contracts.generic.auth.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/service;authv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/generic/auth/v1/message/auth_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Identity & Authentication API"
    version: "1.0"
    description: "API xác thực người dùng bằng tài khoản Google/Facebook."
  }
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer access token (Format: Bearer <token>)"
      }
    }
  }
  security: {
    security_requirement: {
      key: "BearerAuth"
      value: {}
    }
  }
};

service AuthService {
  // Làm mới access token bằng refresh token
  rpc RefreshToken (contracts.generic.auth.v1.message.RefreshTokenRequest) returns (contracts.generic.auth.v1.message.RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {} // Public bypass
    };
  }

  // Đăng xuất và hủy phiên làm việc
  rpc Logout (contracts.generic.auth.v1.message.LogoutRequest) returns (contracts.generic.auth.v1.message.LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout"
      body: "*"
    };
    // Sử dụng BearerAuth mặc định
  }

  // Lấy URL đăng nhập OAuth (Google/Facebook)
  rpc GetOAuthLoginURL (contracts.generic.auth.v1.message.GetOAuthLoginURLRequest) returns (contracts.generic.auth.v1.message.GetOAuthLoginURLResponse) {
    option (google.api.http) = {
      get: "/api/v1/auth/oauth/login"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {} // Public bypass
    };
  }

  // Xoay khóa ký JWT thủ công (chỉ dành cho Admin)
  rpc RotateKeys (contracts.generic.auth.v1.message.RotateKeysRequest) returns (contracts.generic.auth.v1.message.RotateKeysResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/keys/rotate"
      body: "*"
    };
  }

  // Lấy danh sách Public Keys dưới dạng JWKS
  rpc GetJWKS (contracts.generic.auth.v1.message.GetJWKSRequest) returns (contracts.generic.auth.v1.message.GetJWKSResponse) {
    option (google.api.http) = {
      get: "/api/v1/auth/jwks"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {} // Public bypass
    };
  }

  // Đăng nhập bằng tài khoản Google hoặc Facebook
  rpc LoginWithOAuth (contracts.generic.auth.v1.message.LoginWithOAuthRequest) returns (contracts.generic.auth.v1.message.LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login/oauth"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {} // Public bypass
    };
  }
}
