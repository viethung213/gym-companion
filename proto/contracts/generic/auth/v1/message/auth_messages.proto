syntax = "proto3";

package contracts.generic.auth.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/message;authv1message";

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  repeated string roles = 3;
  string expires_at = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
}
