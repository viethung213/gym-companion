syntax = "proto3";

package contracts.generic.auth.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/message;authv1message";

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

message GetOAuthLoginURLRequest {
  string provider = 1; // "google" or "facebook"
  string redirect_uri = 2; // Optional Frontend override callback URL
}

message GetOAuthLoginURLResponse {
  string login_url = 1;
}

message RotateKeysRequest {}

message RotateKeysResponse {
  string message = 1;
}

message GetJWKSRequest {}

message JWKKey {
  string kty = 1; // "RSA"
  string use = 2; // "sig"
  string alg = 3; // "RS256"
  string kid = 4;
  string n = 5; // Modulus (Base64URL encoded)
  string e = 6; // Exponent (Base64URL encoded)
}

message GetJWKSResponse {
  repeated JWKKey keys = 1;
}

message LoginWithOAuthRequest {
  string provider = 1; // "google" or "facebook"
  string code = 2;
  string redirect_uri = 3; // The redirect URL used during the initial request
  string state = 4;
}
