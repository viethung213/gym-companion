syntax = "proto3";

package contracts.generic.auth.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/message;authv1message";

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool isValid = 1;
  string userId = 2;
  repeated string roles = 3;
  string expiresAt = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
  string userId = 3;
}
