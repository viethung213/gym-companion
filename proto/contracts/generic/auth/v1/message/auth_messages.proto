syntax = "proto3";

package contracts.generic.auth.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/generic/auth/v1/message;authv1message";

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  repeated string roles = 3;
  string expires_at = 4;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string phone = 4;
}

message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

message SendOTPRequest {
  string email = 1;
  string purpose = 2; // "REGISTER", "RESET_PASSWORD"
}

message SendOTPResponse {
  string session_id = 1;
  string expires_at = 2;
  string message = 3;
}

message VerifyOTPRequest {
  string session_id = 1;
  string otp_code = 2;
}

message VerifyOTPResponse {
  bool is_valid = 1;
  string verification_token = 2;
  string message = 3;
}

message ResetPasswordRequest {
  string verification_token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}
