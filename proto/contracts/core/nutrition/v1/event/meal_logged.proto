syntax = "proto3";

package contracts.core.nutrition.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/nutrition/v1/event;nutritionv1event";

message MealLogged {
  string user_id = 1;
  string meal_log_id = 2;
  string meal_name = 3;
  string meal_type = 4;
  float calories = 5;
  float protein = 6;
  float carbs = 7;
  float fat = 8;
  string logged_at = 9;
}
