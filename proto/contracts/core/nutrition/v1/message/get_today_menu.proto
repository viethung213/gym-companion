syntax = "proto3";

package contracts.core.nutrition.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/nutrition/v1/message;nutritionv1message";

message GetTodayMenuRequest {
  string user_id = 1;
}

message GetTodayMenuResponse {
  float target_calories = 1;
  
  message Macros {
    float protein_grams = 1;
    float carb_grams = 2;
    float fat_grams = 3;
  }
  
  message MealOption {
    string meal_name = 1;
    string price_tier = 2;
    float calories = 3;
    float protein = 4;
    float carbs = 5;
    float fat = 6;
  }
  
  message DailyMeals {
    repeated MealOption breakfast = 1;
    repeated MealOption lunch = 2;
    repeated MealOption dinner = 3;
  }
  
  Macros macros = 2;
  DailyMeals meals = 3;
}
