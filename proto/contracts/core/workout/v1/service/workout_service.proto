syntax = "proto3";

package contracts.core.workout.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/workout/v1/service;workoutv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/core/workout/v1/message/workout_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "AI Workout Execution & Coaching API"
    version: "1.0"
    description: "API quản lý và giám sát quá trình tập luyện thời gian thực sử dụng AI."
  }
};

service WorkoutService {
  // Bắt đầu một buổi tập mới
  rpc StartWorkoutSession (contracts.core.workout.v1.message.StartWorkoutSessionRequest) returns (contracts.core.workout.v1.message.StartWorkoutSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/workouts/sessions/start"
      body: "*"
    };
  }

  // Lưu kết quả của một set tập
  rpc LogWorkoutSet (contracts.core.workout.v1.message.LogWorkoutSetRequest) returns (contracts.core.workout.v1.message.LogWorkoutSetResponse) {
    option (google.api.http) = {
      post: "/api/v1/workouts/sessions/{sessionId}/sets"
      body: "*"
    };
  }

  // Kết thúc buổi tập và xuất báo cáo
  rpc CompleteWorkoutSession (contracts.core.workout.v1.message.CompleteWorkoutSessionRequest) returns (contracts.core.workout.v1.message.CompleteWorkoutSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/workouts/sessions/{sessionId}/complete"
      body: "*"
    };
  }
}
