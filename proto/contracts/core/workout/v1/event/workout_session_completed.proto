syntax = "proto3";

package contracts.core.workout.v1.event;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/workout/v1/event;workoutv1event";

message PerformanceSummary {
  int32 total_sets_completed = 1;
  float total_volume_kg = 2;
  float average_form_score = 3;
  float estimated_calories_burned = 4;
}

message ExercisePerformance {
  string exercise_id = 1;
  int32 sets_count = 2;
  int32 average_rpe = 3;
}

message PoseError {
  string error_type = 1;
  int32 occurrences = 2;
  string advice = 3;
}

message WorkoutSessionCompleted {
  string session_id = 1;
  string user_id = 2;
  string completed_at = 3;
  int32 total_duration_seconds = 4;
  PerformanceSummary performance_summary = 5;
  repeated ExercisePerformance completed_exercises = 6;
  repeated PoseError common_pose_errors = 7;
  bool is_anti_cheat_verified = 8;
  bool is_anomalous = 9;
  float training_load = 10;
}
