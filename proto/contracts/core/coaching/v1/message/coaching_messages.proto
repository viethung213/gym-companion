syntax = "proto3";

package contracts.core.coaching.v1.message;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/coaching/v1/message;coachingv1message";

message GetWorkoutPlanRequest {
  string user_id = 1;
  string date = 2;
}

message GetWorkoutPlanResponse {
  string plan_id = 1;
  string user_id = 2;
  string date = 3;
  repeated WorkoutPrescription prescriptions = 4;
}

message WorkoutPrescription {
  string exercise_id = 1;
  int32 target_sets = 2;
  int32 target_reps = 3;
  float target_weight = 4;
}

message GenerateWeeklyScheduleRequest {
  string user_id = 1;
  string start_date = 2;
}

message GenerateWeeklyScheduleResponse {
  string schedule_id = 1;
  string user_id = 2;
  repeated string daily_plan_ids = 3;
}
