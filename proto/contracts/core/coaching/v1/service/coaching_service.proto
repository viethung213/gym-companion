syntax = "proto3";

package contracts.core.coaching.v1.service;

option go_package = "github.com/viethung213/gym-companion/internal/gen/go/contracts/core/coaching/v1/service;coachingv1service";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "contracts/core/coaching/v1/message/coaching_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "AI Coaching & Workout Planning API"
    version: "1.0"
    description: "API lập lịch tập luyện tuần và sinh giáo án tập thích ứng hàng ngày."
  }
};

service CoachingService {
  // Lấy giáo án tập chi tiết hôm nay cho người dùng
  rpc GetWorkoutPlan (contracts.core.coaching.v1.message.GetWorkoutPlanRequest) returns (contracts.core.coaching.v1.message.GetWorkoutPlanResponse) {
    option (google.api.http) = {
      get: "/api/v1/coaching/users/{user_id}/plans"
    };
  }

  // Khởi tạo/Sinh lịch tập tuần mới
  rpc GenerateWeeklySchedule (contracts.core.coaching.v1.message.GenerateWeeklyScheduleRequest) returns (contracts.core.coaching.v1.message.GenerateWeeklyScheduleResponse) {
    option (google.api.http) = {
      post: "/api/v1/coaching/users/{user_id}/schedules"
      body: "*"
    };
  }
}
