version: v2
plugins:
  - local: protoc-gen-go
    out: internal/gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: internal/gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - local: protoc-gen-openapiv2
    out: docs/swagger
    opt:
      - json_names_for_fields=true
      - logtostderr=true
